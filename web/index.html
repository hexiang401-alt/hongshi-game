<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>红十多人房间版</title>
<style>
:root{--bg:#0c3329;--felt:#155740;--felt2:#0f4636;--panel:rgba(8,28,24,.78);--line:rgba(255,255,255,.18);--text:#f4f8f6;--muted:#c6d5d0;--gold:#ffd36e;--red:#e64b4b;--green:#63d28b;--card:#fff;--ink:#101010}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;color:var(--text);background:radial-gradient(circle at center 35%,#1d7b58 0%,#0f4938 48%,var(--bg) 100%)}header{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line);background:rgba(0,0,0,.22);position:sticky;top:0;z-index:10}h1{margin:0;font-size:21px;letter-spacing:.08em}.sub{font-size:13px;color:var(--muted)}button,input,select{font:inherit}input{border:1px solid var(--line);border-radius:10px;padding:10px;background:rgba(255,255,255,.12);color:#fff;outline:none}input::placeholder{color:#b8c9c4}button{border:0;border-radius:10px;padding:9px 12px;cursor:pointer;font-weight:750;color:#14241f;background:#f3f3f3}button:disabled{opacity:.45;cursor:not-allowed}.primary{background:var(--gold)}.ghost{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.22)}.warn{background:#ff7b7b;color:#2a0000}.panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:12px;box-shadow:0 12px 24px rgba(0,0,0,.18);backdrop-filter:blur(3px)}.panel h2{margin:0 0 10px;font-size:16px;border-bottom:1px solid var(--line);padding-bottom:8px}.login{max-width:720px;margin:42px auto;padding:16px}.login-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.login .box{border:1px solid var(--line);border-radius:14px;padding:12px;background:rgba(255,255,255,.06)}.layout{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:14px;padding:14px;min-height:calc(100vh - 58px)}.left{min-width:0;display:flex;flex-direction:column;gap:12px}.side{display:flex;flex-direction:column;gap:12px;min-width:0}.board{position:relative;min-height:570px;border-radius:28px;border:1px solid rgba(255,255,255,.22);background:radial-gradient(ellipse at center,rgba(255,255,255,.13) 0%,rgba(255,255,255,.05) 43%,rgba(0,0,0,.08) 67%),linear-gradient(145deg,var(--felt),var(--felt2));overflow:hidden}.table-center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(430px,58vw);min-height:190px;border-radius:50%;border:10px solid rgba(122,71,24,.6);background:radial-gradient(ellipse at center,rgba(255,255,255,.12),rgba(255,255,255,.02) 70%),#104936;box-shadow:inset 0 0 34px rgba(0,0,0,.35),0 12px 35px rgba(0,0,0,.28);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px;text-align:center}.current-title{font-size:13px;color:var(--muted);margin-bottom:8px}.cards-row{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;align-items:flex-end}.seat{position:absolute;width:178px;min-height:102px;padding:9px;border-radius:15px;border:1px solid var(--line);background:rgba(0,0,0,.24);box-shadow:0 8px 18px rgba(0,0,0,.16)}.seat.active{outline:3px solid var(--gold);background:rgba(255,211,110,.14)}.seat.finished{opacity:.66}.seat.me{background:rgba(255,255,255,.10)}.seat[data-pos="0"]{left:50%;bottom:12px;transform:translateX(-50%);width:205px}.seat[data-pos="1"]{right:28px;bottom:105px}.seat[data-pos="2"]{right:28px;top:105px}.seat[data-pos="3"]{left:50%;top:14px;transform:translateX(-50%);width:205px}.seat[data-pos="4"]{left:28px;top:105px}.seat[data-pos="5"]{left:28px;bottom:105px}.seat-top{display:flex;justify-content:space-between;gap:8px;align-items:center}.p-name{font-weight:850}.p-meta{font-size:12px;color:var(--muted);margin-top:3px}.mini-cards{display:flex;justify-content:center;gap:3px;margin-top:6px}.mini-back{width:20px;height:29px;border-radius:4px;background:linear-gradient(135deg,#f9d26a,#b33a3a);border:1px solid rgba(255,255,255,.5);box-shadow:0 2px 5px rgba(0,0,0,.18)}.badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:2px 7px;border-radius:99px;background:rgba(255,255,255,.15);color:#fff;margin-top:6px;margin-right:4px;white-space:nowrap}.badge.red{background:rgba(230,75,75,.23);border:1px solid rgba(255,120,120,.48)}.badge.good{background:rgba(99,210,139,.22);border:1px solid rgba(99,210,139,.45)}.badge.gold{background:rgba(255,211,110,.20);border:1px solid rgba(255,211,110,.52)}.badge.mute{opacity:.78}.suspect{margin-top:6px;width:100%;font-size:12px;border-radius:8px;padding:4px;background:rgba(255,255,255,.1);color:white;border:1px solid var(--line)}.suspect option{color:#111}.card{width:48px;height:68px;border-radius:8px;background:var(--card);color:var(--ink);border:1px solid #d9d9d9;display:flex;flex-direction:column;justify-content:space-between;padding:5px;font-weight:850;box-shadow:0 4px 10px rgba(0,0,0,.25);user-select:none}.card.small{width:38px;height:54px;font-size:12px;border-radius:7px}.card.red{color:#c92323}.card.selected{transform:translateY(-12px);outline:3px solid var(--gold)}.card.clickable{cursor:pointer}.card .rank{font-size:16px;line-height:1}.card .suit{font-size:18px;line-height:1;text-align:right}.card.small .rank{font-size:13px}.card.small .suit{font-size:14px}.speech-box{position:absolute;left:50%;bottom:118px;transform:translateX(-50%);width:min(620px,calc(100% - 36px));z-index:4}.speech-buttons,.actions{display:flex;flex-wrap:wrap;gap:8px}.speech-note{color:var(--muted);font-size:13px;line-height:1.55;margin:8px 0 10px}.hand{min-height:104px;display:flex;flex-wrap:wrap;gap:7px;align-items:flex-end;padding:12px;border-radius:14px;background:rgba(0,0,0,.20);border:1px solid var(--line)}.hand-title{display:flex;justify-content:space-between;gap:8px;align-items:center;margin-bottom:10px}.actions{margin-top:10px}.log{height:300px;overflow:auto;font-size:13px;line-height:1.45;padding-right:4px}.log p{margin:0 0 8px;padding:7px 8px;background:rgba(255,255,255,.06);border-left:3px solid rgba(255,255,255,.24);border-radius:8px}.score-table{width:100%;border-collapse:collapse;font-size:13px}.score-table th,.score-table td{border:1px solid var(--line);padding:6px;text-align:center}.goal{font-size:13px;line-height:1.55;color:#e9f1ef}.finish-box{display:none}.finish-box.open{display:block}.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#fff;color:#111;padding:10px 14px;border-radius:99px;box-shadow:0 10px 25px rgba(0,0,0,.28);display:none;z-index:40;font-weight:800}.toast.show{display:block}@media(max-width:1050px){.layout{grid-template-columns:1fr}.side{display:grid;grid-template-columns:1fr 1fr}.log{height:210px}}@media(max-width:760px){.login-grid{grid-template-columns:1fr}.board{min-height:720px}.seat{width:145px;font-size:13px}.seat[data-pos="1"],.seat[data-pos="2"]{right:8px}.seat[data-pos="4"],.seat[data-pos="5"]{left:8px}.table-center{width:70vw;min-height:170px}.side{display:flex}header{align-items:flex-start;flex-direction:column}}
</style>
</head>
<body>
<header><div><h1>红十</h1><div class="sub" id="topSub">多人房间版 v3.1｜6 人真实对战｜房间同步</div></div><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><button class="ghost" id="soundBtn">音效：开</button><button class="ghost" id="leaveBtn" style="display:none">退出本地身份</button></div></header>
<section class="login panel" id="login"><h2>创建或加入房间</h2><div class="login-grid"><div class="box"><h3>创建房间</h3><p class="sub">创建后把房间码发给另外 5 个玩家。</p><input id="createName" placeholder="你的昵称"/><div style="margin-top:10px"><button class="primary" id="createBtn">创建房间</button></div></div><div class="box"><h3>加入房间</h3><p class="sub">输入房主给你的房间码。</p><input id="joinName" placeholder="你的昵称"/><input id="joinCode" placeholder="房间码，如 A1B2C" style="margin-top:8px;text-transform:uppercase"/><div style="margin-top:10px"><button class="primary" id="joinBtn">加入房间</button></div></div></div></section>
<div class="layout" id="gameUI" style="display:none"><main class="left"><section class="board"><div id="seats"></div><div class="table-center"><div class="current-title">桌面</div><div id="currentText">等待开始</div><div class="cards-row" id="currentCards" style="margin-top:10px"></div></div><div id="phaseBox" class="speech-box panel" style="display:none"></div></section><section class="panel"><div class="hand-title"><b>你的手牌</b><span id="hint" class="sub"></span></div><div class="hand" id="hand"></div><div class="actions"><button class="primary" id="playBtn">出牌</button><button class="ghost" id="passBtn">不要</button><button class="ghost" id="clearBtn">清空选择</button></div></section><section class="panel finish-box" id="finishBox"></section></main><aside class="side"><section class="panel goal"><h2>房间</h2><p id="roomInfo"></p><p>目标：让自己阵营拿第 1，同时避免自己阵营最后。你可以在每个玩家座位上做“怀疑身份”私人标记。</p><div id="hostControls"></div></section><section class="panel"><h2>累计分</h2><table class="score-table" id="totalScore"></table></section><section class="panel"><h2>记录</h2><div class="log" id="log"></div></section></aside></div><div class="toast" id="toast"></div>
<script>
let auth=JSON.parse(localStorage.getItem("hongshi_auth")||"null"),state=null,selected=new Set(),polling=null,soundOn=true,audioCtx=null;const $=id=>document.getElementById(id);
function ensureAudio(){if(!soundOn)return;const Ctx=window.AudioContext||window.webkitAudioContext;if(!Ctx)return;if(!audioCtx)audioCtx=new Ctx();if(audioCtx.state==="suspended")audioCtx.resume()}function tone(f,s,d,g=.05,t="sine"){if(!soundOn||!audioCtx)return;const o=audioCtx.createOscillator(),gn=audioCtx.createGain();o.type=t;o.frequency.setValueAtTime(f,audioCtx.currentTime+s);gn.gain.setValueAtTime(.0001,audioCtx.currentTime+s);gn.gain.exponentialRampToValueAtTime(g,audioCtx.currentTime+s+.01);gn.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+s+d);o.connect(gn);gn.connect(audioCtx.destination);o.start(audioCtx.currentTime+s);o.stop(audioCtx.currentTime+s+d+.02)}function playSound(k){if(!soundOn||!audioCtx)return;if(k==="play"){tone(520,0,.08,.055,"triangle");tone(760,.055,.07,.035,"triangle")}else if(k==="pass")tone(210,0,.10,.045);else if(k==="bomb"){tone(120,0,.11,.08,"sawtooth");tone(90,.09,.15,.06,"sawtooth")}else if(k==="click")tone(680,0,.045,.025)}
function toast(m){$("toast").textContent=m;$("toast").classList.add("show");setTimeout(()=>$("toast").classList.remove("show"),1800)}async function api(path,data){const res=await fetch(path,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data||{})});const js=await res.json();if(!js.ok)throw new Error(js.error||"操作失败");return js}async function getState(){if(!auth)return;const res=await fetch(`/api/state?room=${encodeURIComponent(auth.room)}&pid=${encodeURIComponent(auth.pid)}&_=${Date.now()}`);const js=await res.json();if(!js.ok)throw new Error(js.error||"状态获取失败");state=js.state;render()}function startPolling(){if(polling)clearInterval(polling);polling=setInterval(()=>getState().catch(e=>toast(e.message)),900);getState().catch(e=>toast(e.message))}function saveAuth(a){auth=a;localStorage.setItem("hongshi_auth",JSON.stringify(auth))}
function cardHTML(c,small=false,sel=false,click=false){const rc=(c.red||c.isRedTen)?" red":"",se=sel?" selected":"",sm=small?" small":"",cl=click?" clickable":"",rank=c.isRedTen?"红10":c.rank,suit=c.isJoker?c.suitSymbol:c.suitSymbol;return `<div class="card${rc}${se}${sm}${cl}" data-id="${c.id}"><div class="rank">${rank}</div><div class="suit">${suit}</div></div>`}
function render(){if(!state)return;$("login").style.display="none";$("gameUI").style.display="grid";$("leaveBtn").style.display="inline-block";$("topSub").textContent=`房间 ${state.room}｜你是 ${state.you.name}（玩家${state.you.slot+1}）`;renderSeats();renderHand();renderCurrent();renderPhase();renderScores();renderLog();renderHostControls();renderFinish()}
function renderSeats(){const by={};(state.players||[]).forEach(p=>by[p.slot]=p);let html=[];for(let i=0;i<6;i++){const p=by[i]||{slot:i,name:`等待玩家${i+1}`,cardCount:0},active=state.turn===i&&state.phase==="play"?" active":"",finished=p.finished?" finished":"",me=state.you.slot===i?" me":"";let roleBadge=p.roleKnown?`<span class="badge ${p.role==="红十"?"red":"good"}">${p.role}</span>`:`<span class="badge mute">身份未知</span>`;const suspect=(state.suspects&&state.suspects[String(i)])||"未知",suspectBadge=(!p.roleKnown&&suspect!=="未知")?`<span class="badge gold">${suspect}</span>`:"",declare=p.declare?`<span class="badge">${p.declare}</span>`:"",finish=p.finishRank?`<span class="badge gold">第${p.finishRank}名</span>`:"",dealer=state.dealer===i?`<span class="badge gold">本局先发牌</span>`:"",count=p.cardCount??0,backs=Array.from({length:Math.min(5,count)},()=>`<div class="mini-back"></div>`).join("");const suspectSelect=(state.you.slot!==i&&!p.roleKnown)?`<select class="suspect" data-target="${i}"><option ${suspect==="未知"?"selected":""}>未知</option><option ${suspect==="怀疑红十"?"selected":""}>怀疑红十</option><option ${suspect==="认为平民"?"selected":""}>认为平民</option></select>`:"";html.push(`<div class="seat${active}${finished}${me}" data-pos="${i}"><div class="seat-top"><span class="p-name">${p.name||"空位"}${state.you.slot===i?"（你）":""}</span><span>${count}张</span></div><div class="p-meta">${p.finished?"已出完":(p.name?"在线玩家":"空位")}</div><div>${roleBadge}${suspectBadge}${declare}${finish}${dealer}</div>${suspectSelect}<div class="mini-cards">${backs}</div></div>`)}$("seats").innerHTML=html.join("");document.querySelectorAll(".suspect").forEach(sel=>{sel.onchange=async()=>{try{await action("suspect",{target:Number(sel.dataset.target),mark:sel.value});playSound("click")}catch(e){toast(e.message)}}})}
function renderHand(){const hand=state.ownHand||[];$("hand").innerHTML=hand.map(c=>cardHTML(c,false,selected.has(c.id),true)).join("");$("hand").querySelectorAll(".card").forEach(el=>{el.onclick=()=>{ensureAudio();playSound("click");if(state.phase!=="play"||state.turn!==state.you.slot)return;const id=el.dataset.id;selected.has(id)?selected.delete(id):selected.add(id);renderHand();updateButtons()}});if(!state.phase)$("hint").textContent="等待房主开始";else if(state.phase==="speech")$("hint").textContent=state.speechCurrent===state.you.slot?"轮到你说话":`等待玩家${state.speechCurrent+1}说话`;else if(state.phase==="end")$("hint").textContent="本局结束";else if(state.turn===state.you.slot)$("hint").textContent=state.current?"轮到你：可出牌或不要":"轮到你领出";else $("hint").textContent=`等待玩家${(state.turn??0)+1}行动`;updateButtons()}
function renderCurrent(){if(state.current){const p=state.players.find(x=>x.slot===state.currentPlayer);$("currentText").innerHTML=`${p?p.name:"某玩家"} 出：<b>${state.current.label}</b>`;$("currentCards").innerHTML=state.current.cards.map(c=>cardHTML(c,true)).join("")}else{$("currentText").textContent=state.phase==="play"?"新一轮，等待领出":"等待开始";$("currentCards").innerHTML=""}$("roomInfo").innerHTML=`房间码：<b style="font-size:20px;color:#ffd36e">${state.room}</b><br>玩家：${state.players.length}/6｜第 ${state.handNo||0} 局｜底分倍率：${state.multiplier||1}x`}
function renderPhase(){const box=$("phaseBox");if(state.phase==="speech"&&state.speechCurrent===state.you.slot){box.style.display="block";box.innerHTML=`<h2>轮到你说话</h2><div class="speech-note">可以选择没话、报炮/炸/双王，或者红十亮身份。</div><div class="speech-buttons"><button data-declare="没话">没话</button><button data-declare="有炮">有炮</button><button data-declare="有炸">有炸</button><button data-declare="双王">双王</button><button class="warn" data-declare="红十">红十</button></div>`;box.querySelectorAll("button[data-declare]").forEach(btn=>{btn.onclick=async()=>{ensureAudio();playSound("click");try{await action("declare",{declare:btn.dataset.declare})}catch(e){toast(e.message)}}})}else box.style.display="none"}
function renderScores(){const rows=(state.totalScores||[0,0,0,0,0,0]).map((s,i)=>`<tr><td>玩家${i+1}${state.you.slot===i?"（你）":""}</td><td>${s}</td></tr>`).join("");$("totalScore").innerHTML=`<thead><tr><th>玩家</th><th>累计分</th></tr></thead><tbody>${rows}</tbody>`}function renderLog(){$("log").innerHTML=(state.logs||[]).slice().reverse().map(x=>`<p>${escapeHtml(x)}</p>`).join("")}
function renderHostControls(){const isHost=auth&&state.host===auth.pid;let html="";if(state.waiting){html+=`<p class="sub">等待 6 人加入。只有房主能开始。</p>`;if(isHost)html+=`<button class="primary" id="startBtn" ${state.players.length===6?"":"disabled"}>开始本局</button>`}else if(state.phase==="end")html+=`<button class="primary" id="nextBtn">开始下一局</button>`;$("hostControls").innerHTML=html;const st=$("startBtn");if(st)st.onclick=async()=>{try{await action("start",{})}catch(e){toast(e.message)}};const nx=$("nextBtn");if(nx)nx.onclick=async()=>{try{await action("new_hand",{})}catch(e){toast(e.message)}}}
function renderFinish(){if(state.phase!=="end"||!state.result){$("finishBox").classList.remove("open");$("finishBox").innerHTML="";return}const r=state.result,order=state.finishOrder.map((slot,i)=>{const p=state.players.find(x=>x.slot===slot);return `第${i+1}名：${p?p.name:"玩家"+(slot+1)}`}).join("；"),rows=state.players.map(p=>`<tr><td>${p.name}</td><td>${p.role||""}</td><td>${p.finishRank}</td><td>${r.scores[p.slot]}</td></tr>`).join("");$("finishBox").classList.add("open");$("finishBox").innerHTML=`<h2>结算</h2><p>${order}</p><p><b>结果：</b>${r.winner}｜<b>原因：</b>${r.reason}｜<b>单位分：</b>${r.unit}</p><table class="score-table"><thead><tr><th>玩家</th><th>身份</th><th>名次</th><th>本局分</th></tr></thead><tbody>${rows}</tbody></table>`}
function updateButtons(){const myTurn=state&&state.phase==="play"&&state.turn===state.you.slot;$("playBtn").disabled=!myTurn;$("passBtn").disabled=!myTurn||!state.current;$("clearBtn").disabled=!myTurn||selected.size===0}async function action(type,data){await api("/api/action",{room:auth.room,pid:auth.pid,type,data});await getState()}function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}
$("createBtn").onclick=async()=>{ensureAudio();try{const js=await api("/api/create",{name:$("createName").value.trim()});saveAuth({room:js.room,pid:js.pid});startPolling()}catch(e){toast(e.message)}};$("joinBtn").onclick=async()=>{ensureAudio();try{const js=await api("/api/join",{room:$("joinCode").value.trim().toUpperCase(),name:$("joinName").value.trim()});saveAuth({room:js.room,pid:js.pid});startPolling()}catch(e){toast(e.message)}};$("playBtn").onclick=async()=>{ensureAudio();try{await action("play",{cards:[...selected]});playSound("play");selected.clear()}catch(e){toast(e.message)}};$("passBtn").onclick=async()=>{ensureAudio();try{await action("pass",{});playSound("pass");selected.clear()}catch(e){toast(e.message)}};$("clearBtn").onclick=()=>{selected.clear();renderHand();playSound("click")};$("soundBtn").onclick=()=>{soundOn=!soundOn;$("soundBtn").textContent=`音效：${soundOn?"开":"关"}`;ensureAudio();playSound("click")};$("leaveBtn").onclick=()=>{localStorage.removeItem("hongshi_auth");location.reload()};if(auth)startPolling();
</script>
</body>
</html>
